name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install API dependencies
      run: cd api && npm ci
    
    - name: Install Web dependencies
      run: cd web && npm ci
    
    - name: Lint API
      run: cd api && npm run lint --if-present
    
    - name: Lint Web
      run: cd web && npm run lint --if-present
    
    - name: Test API
      run: cd api && npm test --if-present
    
    - name: Test Web
      run: cd web && npm test --if-present
    
    - name: Build API
      run: cd api && npm run build --if-present
    
    - name: Build Web
      run: cd web && npm run build --if-present
